<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Support AI</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050508;
    --surface: #0d0d14;
    --surface2: #13131e;
    --border: rgba(255,255,255,0.07);
    --border-bright: rgba(99,255,200,0.3);
    --accent: #63ffc8;
    --accent2: #ff6b6b;
    --accent3: #6b8cff;
    --text: #e2e2f0;
    --text-muted: #52526a;
    --high: #ff6b6b;
    --medium: #ffc96b;
    --low: #63ffc8;
    --billing: #b06bff;
    --technical: #6b8cff;
    --general: #ffc96b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,255,200,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,255,200,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Glow blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    pointer-events: none;
    animation: float 8s ease-in-out infinite;
  }

  .blob1 {
    width: 400px; height: 400px;
    background: var(--accent);
    top: -100px; left: -100px;
    animation-delay: 0s;
  }

  .blob2 {
    width: 300px; height: 300px;
    background: var(--accent3);
    bottom: -80px; right: -80px;
    animation-delay: -4s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(30px, 20px); }
  }

  /* Main chat container */
  .chat-container {
    width: 480px;
    height: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(99,255,200,0.05),
      0 40px 80px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.05);
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Header */
  .chat-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }

  .chat-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .ai-avatar {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(99,255,200,0.15), rgba(107,140,255,0.15));
    border: 1px solid rgba(99,255,200,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    position: relative;
  }

  .ai-avatar::after {
    content: '';
    position: absolute;
    bottom: -2px; right: -2px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--surface2);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(99,255,200,0.4); }
    50% { opacity: 0.8; box-shadow: 0 0 0 4px rgba(99,255,200,0); }
  }

  .header-info h2 {
    font-size: 15px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: 0.3px;
  }

  .header-info p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* Model badges */
  .model-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .badge-model {
    background: rgba(99,255,200,0.08);
    color: var(--accent);
    border: 1px solid rgba(99,255,200,0.15);
  }

  .badge-groq {
    background: rgba(107,140,255,0.08);
    color: var(--accent3);
    border: 1px solid rgba(107,140,255,0.15);
  }

  .badge-fast {
    background: rgba(255,201,107,0.08);
    color: var(--general);
    border: 1px solid rgba(255,201,107,0.15);
  }

  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb {
    background: rgba(99,255,200,0.2);
    border-radius: 2px;
  }

  /* Welcome message */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 30px 20px;
    text-align: center;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .welcome-icon {
    width: 60px; height: 60px;
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(99,255,200,0.1), rgba(107,140,255,0.1));
    border: 1px solid rgba(99,255,200,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
  }

  .welcome h3 {
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
  }

  .welcome p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 280px;
  }

  .quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 4px;
  }

  .quick-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .quick-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(99,255,200,0.05);
  }

  /* Message bubbles */
  .msg {
    display: flex;
    gap: 10px;
    animation: msgIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-ava {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.user .msg-ava {
    background: rgba(107,140,255,0.15);
    border: 1px solid rgba(107,140,255,0.2);
    color: var(--accent3);
  }

  .msg.ai .msg-ava {
    background: rgba(99,255,200,0.1);
    border: 1px solid rgba(99,255,200,0.15);
    color: var(--accent);
  }

  .msg-body { max-width: 78%; }

  .msg-bubble {
    padding: 12px 15px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.65;
    word-break: break-word;
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, rgba(107,140,255,0.2), rgba(107,140,255,0.12));
    border: 1px solid rgba(107,140,255,0.2);
    color: var(--text);
    border-radius: 14px 3px 14px 14px;
  }

  .msg.ai .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 3px 14px 14px 14px;
  }

  /* Analysis tags below AI message */
  .analysis-row {
    display: flex;
    gap: 6px;
    margin-top: 7px;
    flex-wrap: wrap;
  }

  .atag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .atag::before { content: ''; width: 5px; height: 5px; border-radius: 50%; }

  .atag-billing { background: rgba(176,107,255,0.12); color: var(--billing); border: 1px solid rgba(176,107,255,0.2); }
  .atag-billing::before { background: var(--billing); }
  .atag-technical { background: rgba(107,140,255,0.12); color: var(--technical); border: 1px solid rgba(107,140,255,0.2); }
  .atag-technical::before { background: var(--technical); }
  .atag-general { background: rgba(255,201,107,0.12); color: var(--general); border: 1px solid rgba(255,201,107,0.2); }
  .atag-general::before { background: var(--general); }

  .atag-high { background: rgba(255,107,107,0.12); color: var(--high); border: 1px solid rgba(255,107,107,0.2); }
  .atag-high::before { background: var(--high); }
  .atag-medium { background: rgba(255,201,107,0.12); color: var(--medium); border: 1px solid rgba(255,201,107,0.2); }
  .atag-medium::before { background: var(--medium); }
  .atag-low { background: rgba(99,255,200,0.12); color: var(--low); border: 1px solid rgba(99,255,200,0.2); }
  .atag-low::before { background: var(--low); }

  .msg-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 5px;
  }

  .msg.user .msg-time { text-align: right; }

  /* Thinking indicator */
  .thinking {
    display: none;
    gap: 10px;
    animation: msgIn 0.3s ease;
  }

  .thinking.show { display: flex; }

  .thinking-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px 14px 14px 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .thinking-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
    animation: blink 1.2s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .thinking-dots { display: flex; gap: 4px; }
  .thinking-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite;
    opacity: 0.6;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.15s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* Input area */
  .input-area {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .input-box {
    display: flex;
    gap: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 10px 10px 16px;
    transition: all 0.25s;
  }

  .input-box:focus-within {
    border-color: rgba(99,255,200,0.3);
    box-shadow: 0 0 0 3px rgba(99,255,200,0.06), 0 0 20px rgba(99,255,200,0.05);
  }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13.5px;
    resize: none;
    height: 36px;
    line-height: 36px;
    padding: 0;
  }

  textarea::placeholder {
    color: var(--text-muted);
    font-size: 13px;
  }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { transform: scale(1.08); box-shadow: 0 0 16px rgba(99,255,200,0.3); }
  .send-btn:active { transform: scale(0.94); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

  .send-btn svg { width: 14px; height: 14px; fill: #050508; }

  .input-hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 8px;
    text-align: center;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="chat-container">

  <!-- Header -->
  <div class="chat-header">
    <div class="header-top">
      <div class="ai-avatar">🤖</div>
      <div class="header-info">
        <h2>Customer Support AI</h2>
        <p>ONLINE · READY TO ASSIST</p>
      </div>
    </div>
    <div class="model-badges">
      <span class="badge badge-model">LLaMA 3.3 70B</span>
      <span class="badge badge-groq">⚡ Groq</span>
      <span class="badge badge-fast">FastAPI</span>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🧠</div>
      <h3>How can I help you today?</h3>
      <p>I'll analyze your issue, classify it, and give you the best support — powered by AI.</p>
      <div class="quick-btns">
        <button class="quick-btn" onclick="quickSend('I was charged twice this month')">💳 Billing Issue</button>
        <button class="quick-btn" onclick="quickSend('App is not working')">🔧 Technical Help</button>
        <button class="quick-btn" onclick="quickSend('How do I reset my password?')">❓ General Query</button>
      </div>
    </div>
  </div>

  <!-- Thinking -->
  <div class="thinking" id="thinking">
    <div class="msg-ava" style="background:rgba(99,255,200,0.1);border:1px solid rgba(99,255,200,0.15);color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:0 0 0 38px">AI</div>
    <div class="thinking-bubble">
      <span class="thinking-label">ANALYZING</span>
      <div class="thinking-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-box">
      <textarea id="msgInput" placeholder="Describe your issue..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">ENTER to send · SHIFT+ENTER for new line</div>
  </div>

</div>

<script>
  const API = "https://customer-support-ai-97ym.onrender.com/support";
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");
  const thinkingEl = document.getElementById("thinking");

  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function getTime() {
    return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  function getCatClass(cat) {
    return cat ? 'atag-' + cat.toLowerCase() : 'atag-general';
  }

  function getPriClass(pri) {
    return pri ? 'atag-' + pri.toLowerCase() : 'atag-low';
  }

  function addMsg(role, text, category, priority) {
    document.getElementById("welcome")?.remove();

    const msg = document.createElement("div");
    msg.className = `msg ${role}`;

    const tagsHTML = (role === "ai" && category) ? `
      <div class="analysis-row">
        <span class="atag ${getCatClass(category)}">${category}</span>
        <span class="atag ${getPriClass(priority)}">${priority}</span>
      </div>` : "";

    msg.innerHTML = `
      <div class="msg-ava">${role === "user" ? "YOU" : "AI"}</div>
      <div class="msg-body">
        <div class="msg-bubble">${text}</div>
        ${tagsHTML}
        <div class="msg-time">${getTime()}</div>
      </div>
    `;

    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function quickSend(text) {
    inputEl.value = text;
    sendMessage();
  }

  async function sendMessage() {
    const message = inputEl.value.trim();
    if (!message || sendBtn.disabled) return;

    inputEl.value = "";
    sendBtn.disabled = true;

    addMsg("user", message);

    thinkingEl.classList.add("show");
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });

      const data = await res.json();
      thinkingEl.classList.remove("show");

      if (data.response) {
        addMsg("ai", data.response, data.category, data.priority);
      } else {
        addMsg("ai", "Sorry, something went wrong. Please try again.");
      }
    } catch (err) {
      thinkingEl.classList.remove("show");
      addMsg("ai", "⚠️ Cannot reach API. Make sure FastAPI is running on <code>localhost:8000</code> and CORS is enabled.");
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
